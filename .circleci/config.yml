version: 2.1

jobs:
  build:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - run: echo "This is a build step"
  test:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - run: echo "This is a test step"
  integration:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - run:
          command: |
            echo "This is an integration step"
            exit 1 || true          # allow_failure equivalent
  prod:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - run: echo "This is a deploy step"
  artifact:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - run: echo "hello" > hello.txt
      - store_artifacts:
          path: hello.txt

workflows:
  version: 2
  django:
    jobs:
      - build:
          filters:
            branches:
              only: main
      - test:
          requires:
            - build
      - integration:
          requires:
            - test
      - prod:
          requires:
            - integration
      - artifact:
          requires:
            - prod
