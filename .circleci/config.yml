version: 2.1

jobs:
  sast-bandit:
    docker:
      - image: cimg/python:3.11
    steps:
      - checkout
      - run: pip install bandit
      - run:
          name: Run Bandit SAST scan
          command: bandit -r . -f txt -o bandit-report.txt || true
      - store_artifacts:
          path: bandit-report.txt

  secrets-gitleaks:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - run:
          name: Install Gitleaks
          command: |
            wget -qO - https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz | tar -xz
            sudo mv gitleaks /usr/local/bin/
      - run:
          name: Scan git history for secrets
          command: gitleaks detect --source . --report-path gitleaks-report.json --exit-code 0
      - store_artifacts:
          path: gitleaks-report.json

  sca-safety:
    docker:
      - image: cimg/python:3.11
    steps:
      - checkout
      - run: pip install safety
      - run:
          name: Scan dependencies for known CVEs
          command: safety check -r requirements.txt --output text > safety-report.txt || true
      - store_artifacts:
          path: safety-report.txt

  build:
    docker:
      - image: cimg/python:3.11
    steps:
      - checkout
      - run: echo "Build passes only after security scans complete"

workflows:
  version: 2
  secure-pipeline:
    jobs:
      - sast-bandit:
          filters:
            branches:
              only: main
      - secrets-gitleaks:
          filters:
            branches:
              only: main
      - sca-safety:
          filters:
            branches:
              only: main
      - build:
          requires:
            - sast-bandit
            - secrets-gitleaks
            - sca-safety
